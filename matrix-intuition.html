<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Intuition for OLS</title>
<style>
:root{--bg:#fff;--fg:#1a1a2e;--card:#f8f7ff;--border:#ddd;--accent:#43418A;--accent2:#6c63ff;--green:#2e7d32;--orange:#e65100;--red:#c62828;--blue:#1565c0;--shadow:0 2px 8px rgba(0,0,0,.08);--radius:8px}
[data-theme=dark]{--bg:#1a1a2e;--fg:#e8e8f0;--card:#262640;--border:#3a3a5c;--shadow:0 2px 8px rgba(0,0,0,.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--fg);line-height:1.6;transition:background .3s,color .3s}
.wrap{max-width:960px;margin:0 auto;padding:16px}
h1{font-size:1.6rem;text-align:center;margin:12px 0 4px;color:var(--accent)}
.subtitle{text-align:center;font-size:.95rem;opacity:.7;margin-bottom:16px}
.theme-btn{position:fixed;top:12px;right:12px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;cursor:pointer;font-size:.85rem;color:var(--fg);z-index:99}
.tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tabs button{background:none;border:none;padding:8px 14px;cursor:pointer;font-size:.88rem;color:var(--fg);opacity:.6;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
.tabs button.active{opacity:1;border-bottom-color:var(--accent);font-weight:600;color:var(--accent)}
.tab-content{display:none}.tab-content.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:12px 0;box-shadow:var(--shadow)}
.card h3{font-size:1.05rem;margin-bottom:8px;color:var(--accent)}
/* Matrix CSS brackets */
.mx{display:inline-flex;align-items:center;vertical-align:middle;margin:2px 4px}
.mx::before,.mx::after{content:'';border:2px solid var(--accent);width:5px;align-self:stretch}
.mx::before{border-right:none;border-radius:4px 0 0 4px}
.mx::after{border-left:none;border-radius:0 4px 4px 0}
.mx table{border-collapse:collapse;margin:3px 5px}
.mx td{padding:2px 7px;text-align:center;font-family:Georgia,serif;font-size:.92rem}
.mx td.hl{background:rgba(67,65,138,.15);border-radius:3px}
.eq{text-align:center;font-family:Georgia,serif;font-size:1.2rem;margin:14px 0;letter-spacing:.3px}
.eq-sm{font-size:1.05rem}
/* Beta-hat */
.hat{font-family:Georgia,serif;font-style:italic}
.btn{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:var(--radius);cursor:pointer;font-size:.88rem;transition:.2s}
.btn:hover{opacity:.85}
.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn-outline:hover{background:var(--accent);color:#fff}
.btn-sm{padding:4px 10px;font-size:.82rem}
.step-nav{display:flex;justify-content:space-between;align-items:center;margin:12px 0}
.step-dots{display:flex;gap:6px}
.step-dots span{width:10px;height:10px;border-radius:50%;background:var(--border);cursor:pointer;transition:.2s}
.step-dots span.active{background:var(--accent)}
.slider-row{display:flex;align-items:center;gap:10px;margin:6px 0}
.slider-row label{width:40px;font-family:Georgia,serif;font-weight:600}
.slider-row input[type=range]{flex:1;accent-color:var(--accent)}
.slider-row .val{width:50px;text-align:right;font-family:Georgia,serif;font-weight:600}
.e-green{color:var(--green);font-weight:600}
.e-orange{color:var(--orange);font-weight:600}
.e-red{color:var(--red);font-weight:600}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}
.i-card{border-radius:var(--radius);padding:14px;margin:8px 0}
.i-orange{background:rgba(230,81,0,.1);border-left:4px solid var(--orange)}
.i-blue{background:rgba(21,101,192,.1);border-left:4px solid var(--blue)}
.i-green{background:rgba(46,125,50,.12);border-left:4px solid var(--green);padding:12px 16px;border-radius:var(--radius);margin:12px 0}
/* Tab1 matrix mult */
.mm-grid{display:inline-grid;gap:2px;margin:8px}
.mm-cell{width:44px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:4px;font-family:Georgia,serif;font-size:.92rem;cursor:pointer;transition:.2s;background:var(--card)}
.mm-cell:hover{border-color:var(--accent)}
.mm-cell.sel{background:rgba(67,65,138,.2);border-color:var(--accent)}
.mm-cell.hi-row{background:rgba(67,65,138,.1)}
.mm-cell.hi-col{background:rgba(108,99,255,.1)}
.anim-box{min-height:80px;padding:10px;font-family:Georgia,serif;font-size:1rem}
.proof-step{margin:10px 0;padding:10px;border-left:3px solid var(--accent);background:var(--card);border-radius:0 var(--radius) var(--radius) 0}
.proof-step .label{font-size:.8rem;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:4px}
canvas{border:1px solid var(--border);border-radius:var(--radius);background:var(--card);max-width:100%}
.coeff-box{display:inline-block;padding:8px 14px;border-radius:var(--radius);margin:4px;font-family:Georgia,serif;font-size:.95rem}
.coeff-simple{background:rgba(230,81,0,.12);border:1px solid var(--orange)}
.coeff-mult{background:rgba(21,101,192,.12);border:1px solid var(--blue)}
sup{font-size:.7em}
.sse-box{text-align:center;font-size:1.15rem;font-family:Georgia,serif;padding:10px;margin:10px 0;background:var(--card);border-radius:var(--radius);border:2px solid var(--accent)}
</style>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()">Dark</button>
<div class="wrap">
<h1>Matrix Algebra &amp; OLS &mdash; Interactive Guide</h1>
<p class="subtitle">Retail Sales Example: 8 stores, 2 predictors, monthly sales ($k)</p>
<div class="tabs" id="tabs"></div>
<div id="tab-panels"></div>
</div>
<script>
"use strict";
/* ===== DATA ===== */
const X=[[1,2,5],[1,3,8],[1,5,12],[1,4,10],[1,6,15],[1,1,4],[1,7,11],[1,3,6]];
const y=[14,18,30,24,34,11,33,18];
const betaHat=[3.97,2.69,0.94];
const XtX=[[8,31,71],[31,149,323],[71,323,731]];
const Xty=[182,828,1839];
const XtXinv=[[0.9243,0.0548,-0.114],[0.0548,0.1625,-0.0771],[-0.114,-0.0771,0.0465]];
const yty=y.reduce((s,v)=>s+v*v,0);

/* ===== SHARED STATE ===== */
let bVals=[2,2,1];
let currentTab=0,currentStep=0;
const TAB_NAMES=["Multiplication","Model \u2192 OLS","Unbiasedness","Variance","Correlation"];

/* ===== HELPERS ===== */
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const R=(v,d)=>+(v).toFixed(d===undefined?2:d);

function mx(rows,label){
  let h='<span style="display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:2px 4px;">';
  h+='<span class="mx"><table>';
  rows.forEach(r=>{h+='<tr>';(Array.isArray(r)?r:[r]).forEach(c=>{h+='<td>'+c+'</td>';});h+='</tr>';});
  h+='</table></span>';
  if(label) h+='<span style="font-size:0.75rem;color:var(--accent);font-weight:600;margin-top:2px;font-family:Georgia,serif;">'+label+'</span>';
  h+='</span>';
  return h;
}
function mxV(arr,label){return mx(arr.map(v=>[v]),label);}
function mxRow(arr,label){return mx([arr],label);}

function computeYhat(b){return X.map(r=>R(r[0]*b[0]+r[1]*b[1]+r[2]*b[2]));}
function computeErrors(b){const yh=computeYhat(b);return y.map((v,i)=>R(v-yh[i]));}
function computeSSE(b){const e=computeErrors(b);return R(e.reduce((s,v)=>s+v*v,0));}
function eClass(v){const a=Math.abs(v);return a<0.5?'e-green':a<2?'e-orange':'e-red';}
function H(l){return '<span class="hat">'+l+'\u0302</span>';}
const XT='X<sup>\u22A4</sup>';

/* ===== THEME ===== */
function toggleTheme(){
  const d=document.documentElement,dk=d.getAttribute('data-theme')==='dark';
  d.setAttribute('data-theme',dk?'':'dark');
  $('.theme-btn').textContent=dk?'Dark':'Light';
  if(currentTab===4)renderCorrelation($('#tab4'));
}

/* ===== TAB SYSTEM ===== */
function initTabs(){
  const tc=$('#tabs'),tp=$('#tab-panels');
  TAB_NAMES.forEach((n,i)=>{
    const b=document.createElement('button');b.textContent=n;b.onclick=()=>switchTab(i);tc.appendChild(b);
    const d=document.createElement('div');d.className='tab-content';d.id='tab'+i;tp.appendChild(d);
  });
  switchTab(0);
}
function switchTab(i){
  currentTab=i;
  $$('.tabs button').forEach((b,j)=>b.classList.toggle('active',j===i));
  $$('.tab-content').forEach((d,j)=>d.classList.toggle('active',j===i));
  renderTab(i);
}
function renderTab(i){
  const el=$('#tab'+i);
  [renderMult,renderModel,renderUnbiased,renderVariance,renderCorrelation][i](el);
}

/* ================= TAB 1: MATRIX MULTIPLICATION ================= */
function renderMult(el){
  const A=[[2,0,1],[3,1,4]],B=[[1,2],[0,3],[5,1]];
  const C=[[7,5],[23,13]];
  let h='<div class="card"><h3>Matrix Multiplication: A(2\u00d73) \u00d7 B(3\u00d72) = C(2\u00d72)</h3>';
  h+='<p style="margin-bottom:10px">Click any cell of C to see how it is computed step by step.</p>';
  h+='<div style="display:flex;flex-wrap:wrap;align-items:center;gap:12px;justify-content:center">';
  h+='<div><div style="text-align:center;font-weight:600;margin-bottom:4px">A</div>';
  h+='<div class="mm-grid" style="grid-template-columns:repeat(3,1fr)" id="mmA">';
  A.forEach((r,i)=>r.forEach((v,j)=>{h+='<div class="mm-cell" data-r="'+i+'" data-c="'+j+'">'+v+'</div>';}));
  h+='</div></div>';
  h+='<span style="font-size:1.4rem;font-family:Georgia">\u00d7</span>';
  h+='<div><div style="text-align:center;font-weight:600;margin-bottom:4px">B</div>';
  h+='<div class="mm-grid" style="grid-template-columns:repeat(2,1fr)" id="mmB">';
  B.forEach((r,i)=>r.forEach((v,j)=>{h+='<div class="mm-cell" data-r="'+i+'" data-c="'+j+'">'+v+'</div>';}));
  h+='</div></div>';
  h+='<span style="font-size:1.4rem;font-family:Georgia">=</span>';
  h+='<div><div style="text-align:center;font-weight:600;margin-bottom:4px">C</div>';
  h+='<div class="mm-grid" style="grid-template-columns:repeat(2,1fr)" id="mmC">';
  C.forEach((r,i)=>r.forEach((v,j)=>{h+='<div class="mm-cell" data-r="'+i+'" data-c="'+j+'" id="cCell'+i+j+'">?</div>';}));
  h+='</div></div></div>';
  h+='<div class="anim-box" id="mmAnim" style="text-align:center;color:var(--accent);margin-top:10px"><em>Click a cell of C to begin</em></div>';
  h+='<div style="text-align:center;margin-top:8px"><button class="btn btn-outline btn-sm" id="mmReset">Reset</button></div></div>';
  el.innerHTML=h;
  setTimeout(()=>{
    $$('#mmC .mm-cell').forEach(c=>c.addEventListener('click',function(){
      mmAnimate(+this.dataset.r,+this.dataset.c,A,B,C);
    }));
    $('#mmReset').addEventListener('click',()=>renderMult(el));
  },0);
}
function mmAnimate(ri,ci,A,B,C){
  $$('#mmA .mm-cell').forEach(c=>{c.className='mm-cell';if(+c.dataset.r===ri)c.classList.add('hi-row');});
  $$('#mmB .mm-cell').forEach(c=>{c.className='mm-cell';if(+c.dataset.c===ci)c.classList.add('hi-col');});
  $$('#mmC .mm-cell').forEach(c=>c.classList.remove('sel'));
  var cc=$('#cCell'+ri+ci);cc.classList.add('sel');
  var box=$('#mmAnim');
  var pairs=[];for(var k=0;k<3;k++)pairs.push('('+A[ri][k]+' \u00d7 '+B[k][ci]+')');
  box.innerHTML='<strong>Step 1 \u2014 Pair elements:</strong><br>Row '+ri+' of A \u00d7 Column '+ci+' of B: '+pairs.join(' , ');
  setTimeout(()=>{
    var prods=[];for(var k=0;k<3;k++)prods.push(A[ri][k]*B[k][ci]);
    box.innerHTML+='<br><br><strong>Step 2 \u2014 Multiply:</strong> '+prods.join(' , ');
    setTimeout(()=>{
      var s=prods.reduce((a,b)=>a+b,0);
      box.innerHTML+='<br><br><strong>Step 3 \u2014 Sum:</strong> '+prods.join(' + ')+' = <strong style="color:var(--accent)">'+s+'</strong>';
      cc.textContent=s;cc.style.fontWeight='700';cc.style.color='var(--accent)';
    },700);
  },700);
}

/* ================= TAB 2: MODEL TO OLS (8 STEPS) ================= */
const N_STEPS=8;
function renderModel(el){
  let h='<div class="step-nav"><button class="btn btn-sm btn-outline" id="prevStep">\u2190 Previous</button>';
  h+='<div class="step-dots" id="stepDots">';
  for(let i=0;i<N_STEPS;i++)h+='<span data-s="'+i+'" title="Step '+(i+1)+'"></span>';
  h+='</div><button class="btn btn-sm" id="nextStep">Next \u2192</button></div>';
  h+='<div id="stepBox"></div>';
  el.innerHTML=h;
  setTimeout(()=>{
    $('#prevStep').addEventListener('click',()=>{if(currentStep>0){currentStep--;showStep();}});
    $('#nextStep').addEventListener('click',()=>{if(currentStep<N_STEPS-1){currentStep++;showStep();}});
    $$('#stepDots span').forEach(d=>d.addEventListener('click',function(){currentStep=+this.dataset.s;showStep();}));
    showStep();
  },0);
}
function showStep(){
  $$('#stepDots span').forEach((d,i)=>d.classList.toggle('active',i===currentStep));
  $('#prevStep').disabled=currentStep===0;
  $('#nextStep').disabled=currentStep===N_STEPS-1;
  const box=$('#stepBox');
  box.innerHTML=[stp1,stp2,stp3,stp4,stp5,stp6,stp7,stp8][currentStep]();
  if(currentStep>=1&&currentStep<=4)setTimeout(attachSliders,0);
}
/* Slider HTML shared by steps 2-4 */
function sliderBlock(){
  const L=['b\u2080','b\u2081','b\u2082'],lo=[-2,-1,-2],hi=[10,6,4];
  let h='<div class="card" id="sliderCard"><h3>Choose coefficients</h3>';
  for(let i=0;i<3;i++){
    h+='<div class="slider-row"><label>'+L[i]+'</label>';
    h+='<input type="range" min="'+lo[i]+'" max="'+hi[i]+'" step="0.1" value="'+bVals[i]+'" id="sl'+i+'">';
    h+='<span class="val" id="sv'+i+'">'+R(bVals[i],1)+'</span></div>';
  }
  h+='<div style="margin-top:8px;text-align:right"><button class="btn btn-sm btn-outline" id="showOpt">Show optimal '+H('\u03B2')+'</button></div></div>';
  return h;
}
function attachSliders(){
  for(let i=0;i<3;i++){
    const sl=$('#sl'+i);if(!sl)return;
    sl.addEventListener('input',function(){bVals[i]=+this.value;$('#sv'+i).textContent=R(bVals[i],1);updateLive();});
  }
  const ob=$('#showOpt');
  if(ob)ob.addEventListener('click',()=>{
    bVals=[3.97,2.69,0.94];
    for(let i=0;i<3;i++){$('#sl'+i).value=bVals[i];$('#sv'+i).textContent=bVals[i];}
    updateLive();
  });
  updateLive();
}
function updateLive(){
  const yh=computeYhat(bVals),errs=computeErrors(bVals),sse=computeSSE(bVals);
  /* Step 2 panel */
  const p2=$('#liveCalc');
  if(p2){
    let h='<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;justify-content:center;overflow-x:auto">';
    h+=mx(X,'X')+' \u00d7 '+mxV(bVals.map(v=>R(v,2)),'b')+' = '+mxV(yh,'\u0177 = Xb');
    h+='</div>';
    h+='<div style="margin-top:12px"><table style="width:100%;border-collapse:collapse;font-size:.9rem">';
    h+='<tr style="font-weight:600;border-bottom:2px solid var(--border)"><td>Store</td><td>Employees</td><td>Floor (100sf)</td><td>\u0177</td><td>y</td><td>e = y\u2212\u0177</td></tr>';
    for(let i=0;i<8;i++){
      h+='<tr style="border-bottom:1px solid var(--border)">';
      h+='<td>'+(i+1)+'</td><td>'+X[i][1]+'</td><td>'+X[i][2]+'</td>';
      h+='<td>'+yh[i]+'</td><td>'+y[i]+'</td>';
      h+='<td class="'+eClass(errs[i])+'">'+errs[i]+'</td></tr>';
    }
    h+='</table></div>';
    h+='<div class="sse-box">SSE = \u03A3 e<sub>i</sub>\u00b2 = <strong>'+sse+'</strong></div>';
    p2.innerHTML=h;
  }
  /* Step 3 panel */
  const p3=$('#liveStep3');
  if(p3){
    let h='<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;justify-content:center;overflow-x:auto">';
    h+=mxV(y,'y')+' \u2212 '+mxV(yh,'\u0177 = Xb')+' = '+mxV(errs.map(v=>'<span class="'+eClass(v)+'">'+v+'</span>'),'e = y\u2212Xb');
    h+='</div>';
    p3.innerHTML=h;
  }
  /* Step 4 panel */
  const p4=$('#liveStep4');
  if(p4){
    const sq=errs.map(v=>R(v*v));
    let h='<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;justify-content:center;overflow-x:auto;margin-bottom:10px">';
    h+=mxRow(errs,'e\u1D40')+' \u00d7 '+mxV(errs,'e')+' = <span style="font-family:Georgia;font-size:1.1rem;font-weight:bold;color:var(--accent)">'+sse+'</span>';
    h+='</div>';
    h+='<div style="text-align:center;font-family:Georgia;font-size:.9rem;margin:6px 0">';
    h+=errs.map(v=>'('+v+')\u00b2').join(' + ')+' = '+sq.join(' + ')+' = <strong>'+sse+'</strong></div>';
    h+='<div class="sse-box">Your SSE = <strong>'+sse+'</strong> &emsp;|&emsp; Optimal SSE = <strong>4.64</strong></div>';
    p4.innerHTML=h;
  }
  /* Step 5 panel — show full expansion with current b */
  const p5=$('#liveStep5');
  if(p5){
    const b=bVals;
    const bTXTy = R(b[0]*Xty[0]+b[1]*Xty[1]+b[2]*Xty[2]);
    // b'X'Xb
    let bXXb=0;
    for(let i=0;i<3;i++) for(let j=0;j<3;j++) bXXb+=b[i]*XtX[i][j]*b[j];
    bXXb=R(bXXb);
    const sseCalc = R(yty - 2*bTXTy + bXXb);
    let h='<div class="proof-step"><div class="label">With your b = ['+b.map(v=>R(v,1)).join(', ')+']</div>';
    h+='<div style="font-family:Georgia,serif;font-size:.95rem;text-align:center;">';
    h+='SSE = y\u1D40y \u2212 2b\u1D40'+XT+'y + b\u1D40'+XT+'Xb<br><br>';
    h+='= '+yty+' \u2212 2\u00d7'+bTXTy+' + '+bXXb+'<br><br>';
    h+='= '+yty+' \u2212 '+(2*bTXTy).toFixed(2)+' + '+bXXb+'<br><br>';
    h+='= <strong style="color:var(--accent);font-size:1.2rem">'+sseCalc+'</strong>';
    h+='</div></div>';
    h+='<div class="sse-box">SSE(b) = <strong>'+sseCalc+'</strong> &emsp;|&emsp; Optimal SSE = <strong>4.64</strong></div>';
    p5.innerHTML=h;
  }
}

/* --- Individual step builders --- */
function stp1(){
  let h='<div class="card"><h3>Step 1: The Model</h3>';
  h+='<div class="eq">y = X\u03B2 + u</div>';
  h+='<div class="two-col"><div>';
  h+='<h3 style="font-size:.95rem">\u{1F4D0} Symbolic</h3>';
  h+='<div style="text-align:center;overflow-x:auto">';
  h+=mxV(['y\u2081','y\u2082','\u22EE','y<sub>n</sub>'],'y')+' = ';
  h+=mx([['1','x<sub>11</sub>','x<sub>12</sub>'],['1','x<sub>21</sub>','x<sub>22</sub>'],['\u22EE','\u22EE','\u22EE'],['1','x<sub>n1</sub>','x<sub>n2</sub>']],'X')+' ';
  h+=mxV(['\u03B2\u2080','\u03B2\u2081','\u03B2\u2082'],'\u03B2')+' + '+mxV(['u\u2081','u\u2082','\u22EE','u<sub>n</sub>'],'u');
  h+='</div></div><div>';
  h+='<h3 style="font-size:.95rem">\u{1F522} Our Data (8 Stores)</h3>';
  h+='<p style="font-size:.82rem;margin-bottom:4px"><em>Intercept | Employees | Floor space (100 sqft) \u2192 Sales ($k)</em></p>';
  h+='<div style="text-align:center;overflow-x:auto">';
  h+=mxV(y,'y: sales')+' = '+mx(X,'X: predictors')+' '+mxV(['?','?','?'],'\u03B2 = ?')+' + '+mxV(y.map(()=>'?'),'u: errors');
  h+='</div></div></div>';
  h+='<p style="margin-top:10px">Each row is one store. We observe sales (y) and predictors (X). We want to find coefficients \u03B2 that best predict sales from number of employees and floor space.</p></div>';
  return h;
}
function stp2(){
  let h=sliderBlock();
  h+='<div class="card"><h3>Step 2: See Xb Live</h3>';
  h+='<div class="eq eq-sm">\u0177 = Xb &emsp;\u2192&emsp; e = y \u2212 \u0177 &emsp;\u2192&emsp; SSE = \u03A3 e<sub>i</sub>\u00b2</div>';
  h+='<p style="margin-bottom:8px">Adjust sliders \u2192 matrix Xb updates \u2192 predictions, errors, and SSE all change in real time.</p>';
  h+='<div id="liveCalc"></div></div>';
  return h;
}
function stp3(){
  let h=sliderBlock();
  h+='<div class="card"><h3>Step 3: Errors e = y \u2212 Xb</h3>';
  h+='<div class="eq eq-sm">e = y \u2212 Xb</div>';
  h+='<p>Each error is the difference between actual and predicted sales. <span class="e-green">Green</span> = small (&lt;0.5), <span class="e-orange">orange</span> = medium (0.5\u20132), <span class="e-red">red</span> = large (&gt;2).</p>';
  h+='<div id="liveStep3" style="margin-top:10px"></div></div>';
  return h;
}
function stp4(){
  let h=sliderBlock();
  h+='<div class="card"><h3>Step 4: SSE = e<sup>\u22A4</sup>e</h3>';
  h+='<div class="eq eq-sm">SSE = e<sup>\u22A4</sup>e = \u03A3 e<sub>i</sub>\u00b2</div>';
  h+='<p>We square each error and sum them. OLS finds the b that minimizes this quantity.</p>';
  h+='<div id="liveStep4" style="margin-top:10px"></div></div>';
  return h;
}
function stp5(){
  let h=sliderBlock();
  h+='<div class="card"><h3>Step 5: SSE in Matrix Form</h3>';
  h+='<div class="eq eq-sm">SSE = (y \u2212 Xb)<sup>\u22A4</sup>(y \u2212 Xb) = y<sup>\u22A4</sup>y \u2212 2b<sup>\u22A4</sup>'+XT+'y + b<sup>\u22A4</sup>'+XT+'Xb</div>';
  h+='<p style="margin:10px 0">Three building blocks (constant matrices from data) + your choice of b:</p>';
  h+='<div class="proof-step"><div class="label">\u2460 y<sup>\u22A4</sup>y (constant = '+yty+')</div>';
  h+='<div style="overflow-x:auto;text-align:center">'+mxRow(y,'y\u1D40')+' \u00d7 '+mxV(y,'y')+' = <strong>'+yty+'</strong></div></div>';
  h+='<div class="proof-step"><div class="label">\u2461 '+XT+'X (constant 3\u00d73 matrix)</div>';
  h+='<div style="overflow-x:auto;text-align:center">'+mx(XtX,XT+'X')+'</div></div>';
  h+='<div class="proof-step"><div class="label">\u2462 '+XT+'y (constant 3\u00d71 vector)</div>';
  h+='<div style="overflow-x:auto;text-align:center">'+mxV(Xty,XT+'y')+'</div></div>';
  h+='<div id="liveStep5" style="margin-top:10px"></div></div>';
  return h;
}
function stp6(){
  let h='<div class="card"><h3>Step 6: Minimize SSE \u2014 Derivative Rules</h3>';
  h+='<p style="margin-bottom:10px">To minimize SSE(b) = y\u1D40y \u2212 2b\u1D40'+XT+'y + b\u1D40'+XT+'Xb, we take the derivative w.r.t. b and set it to zero.</p>';
  h+='<div class="proof-step"><div class="label">Matrix derivative rules</div>';
  h+='<div style="font-family:Georgia,serif;font-size:.95rem;">';
  h+='<table style="border-collapse:collapse;margin:0 auto"><tr><td style="padding:4px 12px;border-bottom:1px solid var(--border)">If f(b) = c\u1D40b &ensp;(linear)</td><td style="padding:4px 12px;border-bottom:1px solid var(--border)">\u2192 \u2202f/\u2202b = c</td></tr>';
  h+='<tr><td style="padding:4px 12px;border-bottom:1px solid var(--border)">If f(b) = b\u1D40Ab &ensp;(quadratic, A symmetric)</td><td style="padding:4px 12px;border-bottom:1px solid var(--border)">\u2192 \u2202f/\u2202b = 2Ab</td></tr>';
  h+='<tr><td style="padding:4px 12px">If f(b) = constant</td><td style="padding:4px 12px">\u2192 \u2202f/\u2202b = 0</td></tr></table></div></div>';
  h+='<div class="proof-step"><div class="label">Apply to SSE</div>';
  h+='<div style="font-family:Georgia,serif;font-size:.95rem;">';
  h+='<p>\u2202/\u2202b [y\u1D40y] = 0 &emsp;<span style="color:var(--accent)">(constant, no b)</span></p>';
  h+='<p>\u2202/\u2202b [\u22122b\u1D40'+XT+'y] = \u22122'+XT+'y &emsp;<span style="color:var(--accent)">(linear rule, c = '+XT+'y)</span></p>';
  h+='<p>\u2202/\u2202b [b\u1D40'+XT+'Xb] = 2'+XT+'Xb &emsp;<span style="color:var(--accent)">(quadratic rule, A = '+XT+'X)</span></p>';
  h+='</div></div>';
  h+='<div class="proof-step"><div class="label">Set to zero \u2192 Normal equations</div>';
  h+='<div class="eq eq-sm">\u22122'+XT+'y + 2'+XT+'Xb = 0 &ensp;\u2192&ensp; '+XT+'X'+H('\u03B2')+' = '+XT+'y</div></div>';
  h+='<p style="margin:10px 0">With our data:</p>';
  h+='<div style="text-align:center;overflow-x:auto">'+mx(XtX,XT+'X')+' \u00d7 '+mxV([H('\u03B2')+'\u2080',H('\u03B2')+'\u2081',H('\u03B2')+'\u2082'],H('\u03B2'))+' = '+mxV(Xty,XT+'y')+'</div>';
  h+='<p style="margin-top:10px">3 equations, 3 unknowns. Solve by inverting '+XT+'X.</p></div>';
  return h;
}
function stp7(){
  let h='<div class="card"><h3>Step 7: Solution '+H('\u03B2')+' = ('+XT+'X)<sup>\u22121</sup>'+XT+'y</h3>';
  h+='<div class="proof-step"><div class="label">Step A: We already computed '+XT+'X</div>';
  h+='<div style="text-align:center">'+mx(XtX,XT+'X')+'</div></div>';
  h+='<div class="proof-step"><div class="label">Step B: Invert it</div>';
  h+='<div style="text-align:center">'+mx(XtXinv.map(r=>r.map(v=>R(v,4))),'('+XT+'X)<sup>\u22121</sup>')+'</div></div>';
  h+='<div class="proof-step"><div class="label">Step C: '+XT+'y</div>';
  h+='<div style="text-align:center">'+mxV(Xty,XT+'y')+'</div></div>';
  h+='<div class="proof-step"><div class="label">Step D: Multiply</div>';
  h+='<div style="text-align:center;overflow-x:auto">'+mx(XtXinv.map(r=>r.map(v=>R(v,4))),'('+XT+'X)<sup>\u22121</sup>')+' \u00d7 '+mxV(Xty,XT+'y')+' = '+mxV(betaHat,H('\u03B2'))+'</div></div>';
  h+='<div class="i-card i-green" style="margin-top:12px"><strong>Interpretation:</strong><br>';
  h+=H('\u03B2')+'\u2080 = 3.97 \u2192 baseline sales of $3,970/month<br>';
  h+=H('\u03B2')+'\u2081 = 2.69 \u2192 each additional employee adds ~$2,690/month in sales<br>';
  h+=H('\u03B2')+'\u2082 = 0.94 \u2192 each additional 100 sqft adds ~$940/month in sales</div></div>';
  return h;
}
function stp8(){
  let h='<div class="card"><h3>Step 8: Intuition \u2014 What Does Each Piece Do?</h3>';
  h+='<div class="eq">'+H('\u03B2')+' = <span style="color:var(--orange)">('+XT+'X)<sup>\u22121</sup></span> <span style="color:var(--blue)">'+XT+'y</span></div>';
  h+='<div class="i-card i-blue"><strong style="color:var(--blue)">'+XT+'y \u2014 Raw Association</strong>';
  h+='<p>This vector captures how much each predictor correlates with the outcome. It sums up x<sub>i</sub> \u00d7 y<sub>i</sub> for each predictor. Alone, this would give biased coefficients because it ignores correlations between predictors.</p>';
  h+='<p style="margin-top:6px">In our data: '+mxV(Xty)+'</p></div>';
  h+='<div class="i-card i-orange"><strong style="color:var(--orange)">('+XT+'X)<sup>\u22121</sup> \u2014 Decorrelation</strong>';
  h+='<p>'+XT+'X measures how the predictors relate to each other (including self-variation on the diagonal). Inverting it removes these correlations, giving each predictor its <em>partial</em> effect \u2014 holding the others constant.</p>';
  h+='<p style="margin-top:6px">In our data: '+mx(XtXinv.map(r=>r.map(v=>R(v,4))))+'</p></div>';
  h+='<p style="margin-top:12px">Together: we first measure raw associations ('+XT+'y), then adjust for predictor correlations (('+XT+'X)<sup>\u22121</sup>). That is the essence of multiple regression.</p></div>';
  return h;
}

/* ================= TAB 3: UNBIASEDNESS ================= */
function renderUnbiased(el){
  let h='<div class="card"><h3>Unbiasedness of OLS: E('+H('\u03B2')+') = \u03B2</h3>';
  h+='<p style="margin-bottom:12px">We show that the OLS estimator is unbiased \u2014 on average, it equals the true parameter vector.</p>';

  h+='<div class="proof-step"><div class="label">Start with the OLS formula</div>';
  h+='<div class="eq eq-sm">'+H('\u03B2')+' = ('+XT+'X)<sup>\u22121</sup>'+XT+'y</div></div>';

  h+='<div class="proof-step"><div class="label">Substitute y = X\u03B2 + u</div>';
  h+='<div class="eq eq-sm">'+H('\u03B2')+' = ('+XT+'X)<sup>\u22121</sup>'+XT+'(X\u03B2 + u)</div></div>';

  h+='<div class="proof-step"><div class="label">Distribute the multiplication</div>';
  h+='<div class="eq eq-sm">= ('+XT+'X)<sup>\u22121</sup>'+XT+'X\u03B2 + ('+XT+'X)<sup>\u22121</sup>'+XT+'u</div></div>';

  h+='<div class="proof-step"><div class="label">Simplify: ('+XT+'X)<sup>\u22121</sup>('+XT+'X) = I</div>';
  h+='<div class="eq eq-sm">= <span style="color:var(--accent);font-weight:700">\u03B2</span> + ('+XT+'X)<sup>\u22121</sup>'+XT+'u</div></div>';

  h+='<div class="proof-step"><div class="label">Take expectation (X is treated as fixed, E(u|X) = 0)</div>';
  h+='<div class="eq eq-sm">E('+H('\u03B2')+') = \u03B2 + ('+XT+'X)<sup>\u22121</sup>'+XT+' <span style="color:var(--green)">E(u)</span></div>';
  h+='<div class="eq eq-sm">= \u03B2 + ('+XT+'X)<sup>\u22121</sup>'+XT+' \u00b7 <span style="color:var(--green)">0</span></div>';
  h+='<div class="eq eq-sm">= <strong style="color:var(--accent)">\u03B2</strong></div></div>';

  h+='<div class="i-card i-green"><strong style="color:var(--green)">\u2713 Unbiased!</strong> On average across repeated samples, OLS recovers the true \u03B2. The key assumption is E(u|X) = 0 \u2014 errors are mean-zero conditional on the regressors.</div>';
  h+='</div>';
  el.innerHTML=h;
}

/* ================= TAB 4: VARIANCE ================= */
function renderVariance(el){
  let h='<div class="card"><h3>Variance of '+H('\u03B2')+': Var('+H('\u03B2')+') = \u03C3\u00b2('+XT+'X)<sup>\u22121</sup></h3>';
  h+='<p style="margin-bottom:12px">How uncertain are our coefficient estimates?</p>';

  h+='<div class="proof-step"><div class="label">From the unbiasedness proof we have</div>';
  h+='<div class="eq eq-sm">'+H('\u03B2')+' \u2212 \u03B2 = ('+XT+'X)<sup>\u22121</sup>'+XT+'u</div></div>';

  h+='<div class="proof-step"><div class="label">Variance definition</div>';
  h+='<div class="eq eq-sm">Var('+H('\u03B2')+') = E[('+H('\u03B2')+' \u2212 \u03B2)('+H('\u03B2')+' \u2212 \u03B2)<sup>\u22A4</sup>]</div></div>';

  h+='<div class="proof-step"><div class="label">Substitute</div>';
  h+='<div class="eq eq-sm">= E[('+XT+'X)<sup>\u22121</sup>'+XT+'uu<sup>\u22A4</sup>X('+XT+'X)<sup>\u22121</sup>]</div></div>';

  h+='<div class="proof-step"><div class="label">Apply E(uu<sup>\u22A4</sup>) = \u03C3\u00b2I (homoskedasticity)</div>';
  h+='<div class="eq eq-sm">= ('+XT+'X)<sup>\u22121</sup>'+XT+' \u00b7 \u03C3\u00b2I \u00b7 X('+XT+'X)<sup>\u22121</sup></div>';
  h+='<div class="eq eq-sm">= \u03C3\u00b2 ('+XT+'X)<sup>\u22121</sup> <span style="color:var(--accent)">('+XT+'X)('+XT+'X)<sup>\u22121</sup></span></div>';
  h+='<div class="eq eq-sm">= <strong style="color:var(--accent)">\u03C3\u00b2('+XT+'X)<sup>\u22121</sup></strong></div></div>';

  h+='<div class="proof-step"><div class="label">With our data</div>';
  h+='<div style="text-align:center;overflow-x:auto">Var('+H('\u03B2')+') = \u03C3\u00b2 \u00d7 '+mx(XtXinv.map(r=>r.map(v=>R(v,4))))+'</div>';
  h+='<p style="margin-top:8px">Diagonal elements give individual coefficient variances:</p>';
  h+='<ul style="margin:6px 0 0 18px;font-family:Georgia;font-size:.92rem">';
  h+='<li>Var('+H('\u03B2')+'\u2080) = 0.9243\u03C3\u00b2 \u2014 intercept (most uncertain)</li>';
  h+='<li>Var('+H('\u03B2')+'\u2081) = 0.1625\u03C3\u00b2 \u2014 employees coefficient</li>';
  h+='<li>Var('+H('\u03B2')+'\u2082) = 0.0465\u03C3\u00b2 \u2014 floor space coefficient (most precise)</li>';
  h+='</ul></div>';

  h+='<div class="i-card i-orange"><strong style="color:var(--orange)">\u03C3\u00b2 \u2014 Noise Level</strong>';
  h+='<p>More noise in sales data means more uncertain estimates. Estimated as SSE/(n\u2212k) = 4.64/5 \u2248 0.93.</p></div>';

  h+='<div class="i-card i-blue"><strong style="color:var(--blue)">('+XT+'X)<sup>\u22121</sup> \u2014 Predictor Structure</strong>';
  h+='<p>More variation in predictors \u2192 smaller ('+XT+'X)<sup>\u22121</sup> \u2192 more precise estimates. Correlated predictors inflate variance (multicollinearity).</p></div>';
  h+='</div>';
  el.innerHTML=h;
}

/* ================= TAB 5: CORRELATION DEMO ================= */
let corrR=0.3;
function renderCorrelation(el){
  let h='<div class="card"><h3>Simple vs Multiple Regression: The Role of Predictor Correlation</h3>';
  h+='<p>When predictors are correlated, simple regression coefficients differ from multiple regression. Adjust the correlation between x\u2081 and x\u2082 to see how.</p>';
  h+='<div class="slider-row" style="margin:14px 0"><label style="width:80px">Corr(x\u2081,x\u2082)</label>';
  h+='<input type="range" min="-0.95" max="0.99" step="0.01" value="'+corrR+'" id="corrSl">';
  h+='<span class="val" id="corrV">'+R(corrR,2)+'</span></div>';
  h+='<div style="text-align:center"><canvas id="corrCvs" width="440" height="340"></canvas></div>';
  h+='<div style="text-align:center;margin:10px 0" id="corrCoeffs"></div>';
  h+='<div id="corrExplain"></div></div>';
  el.innerHTML=h;
  setTimeout(()=>{
    $('#corrSl').addEventListener('input',function(){corrR=+this.value;$('#corrV').textContent=R(corrR,2);drawCorr();});
    drawCorr();
  },0);
}
function drawCorr(){
  const cvs=$('#corrCvs');if(!cvs)return;
  const ctx=cvs.getContext('2d'),W=cvs.width,HH=cvs.height;
  const dk=document.documentElement.getAttribute('data-theme')==='dark';
  const fg=dk?'#e8e8f0':'#1a1a2e',bg=dk?'#262640':'#f8f7ff';
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,HH);
  /* seeded RNG */
  const n=80;let seed=42;
  function pr(){seed=(seed*16807)%2147483647;return(seed-1)/2147483646;}
  function rn(){let u=0,v=0;while(!u)u=pr();while(!v)v=pr();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
  const trueB1=2.5,trueB2=1.5;
  const x1=[],x2=[],yy=[];
  for(let i=0;i<n;i++){
    const z1=rn(),z2=rn();
    x1.push(z1);
    x2.push(corrR*z1+Math.sqrt(Math.max(0,1-corrR*corrR))*z2);
    yy.push(trueB1*x1[i]+trueB2*x2[i]+rn()*1.5);
  }
  /* Simple regression y~x1 */
  const m1=x1.reduce((a,b)=>a+b)/n,my=yy.reduce((a,b)=>a+b)/n,m2=x2.reduce((a,b)=>a+b)/n;
  let sxy=0,sx=0;
  for(let i=0;i<n;i++){sxy+=(x1[i]-m1)*(yy[i]-my);sx+=(x1[i]-m1)**2;}
  const simB=sxy/sx;
  /* Multiple regression y~x1+x2 */
  let s11=0,s12=0,s22=0,sy1=0,sy2=0;
  for(let i=0;i<n;i++){const d1=x1[i]-m1,d2=x2[i]-m2,dy=yy[i]-my;s11+=d1*d1;s12+=d1*d2;s22+=d2*d2;sy1+=d1*dy;sy2+=d2*dy;}
  const det=s11*s22-s12*s12||1e-9;
  const mB1=(s22*sy1-s12*sy2)/det,mB2=(s11*sy2-s12*sy1)/det;
  /* Plot y vs x1 */
  const pad=45,pw=W-2*pad,ph=HH-2*pad;
  const xmn=Math.min(...x1)-.5,xmx=Math.max(...x1)+.5;
  const ymn=Math.min(...yy)-1,ymx=Math.max(...yy)+1;
  const tx=v=>pad+(v-xmn)/(xmx-xmn)*pw;
  const ty=v=>HH-pad-(v-ymn)/(ymx-ymn)*ph;
  /* Axes */
  ctx.strokeStyle=fg;ctx.globalAlpha=.25;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,HH-pad);ctx.lineTo(W-pad,HH-pad);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pad,HH-pad);ctx.lineTo(pad,pad);ctx.stroke();
  ctx.globalAlpha=1;ctx.fillStyle=fg;ctx.font='12px system-ui';ctx.textAlign='center';
  ctx.fillText('x\u2081',W/2,HH-8);
  ctx.save();ctx.translate(14,HH/2);ctx.rotate(-Math.PI/2);ctx.fillText('y',0,0);ctx.restore();
  /* Points */
  ctx.fillStyle='#43418A';ctx.globalAlpha=.45;
  for(let i=0;i<n;i++){ctx.beginPath();ctx.arc(tx(x1[i]),ty(yy[i]),3.5,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  /* Simple line (dashed orange) */
  const xl=xmn,xr=xmx,sInt=my-simB*m1;
  ctx.strokeStyle='#e65100';ctx.lineWidth=2.5;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(tx(xl),ty(sInt+simB*xl));ctx.lineTo(tx(xr),ty(sInt+simB*xr));ctx.stroke();
  ctx.setLineDash([]);
  /* Multiple line (solid blue) - projected at mean x2 */
  const mInt=my-mB1*m1-mB2*m2;
  ctx.strokeStyle='#1565c0';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(tx(xl),ty(mInt+mB1*xl+mB2*m2));ctx.lineTo(tx(xr),ty(mInt+mB1*xr+mB2*m2));ctx.stroke();
  /* Legend */
  ctx.font='12px system-ui';ctx.textAlign='left';
  ctx.strokeStyle='#e65100';ctx.setLineDash([6,4]);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W-185,pad+10);ctx.lineTo(W-160,pad+10);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#e65100';ctx.fillText('Simple: b\u2081='+R(simB,2),W-155,pad+14);
  ctx.strokeStyle='#1565c0';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W-185,pad+28);ctx.lineTo(W-160,pad+28);ctx.stroke();
  ctx.fillStyle='#1565c0';ctx.fillText('Multiple: b\u2081='+R(mB1,2),W-155,pad+32);
  /* Coefficient boxes */
  const cc=$('#corrCoeffs');
  if(cc) cc.innerHTML='<span class="coeff-box coeff-simple">Simple: b\u2081 = '+R(simB,2)+' <span style="opacity:.6">(true 2.50)</span></span> <span class="coeff-box coeff-mult">Multiple: b\u2081 = '+R(mB1,2)+', b\u2082 = '+R(mB2,2)+' <span style="opacity:.6">(true 2.50, 1.50)</span></span>';
  /* Explanation */
  const ce=$('#corrExplain');
  if(ce){
    const ar=Math.abs(corrR);let msg;
    if(ar<0.2) msg='With near-zero correlation between predictors, simple and multiple regression give similar coefficients. Each predictor carries mostly unique information about sales.';
    else if(ar<0.6) msg='With moderate correlation (r = '+R(corrR,2)+'), the simple regression coefficient for x\u2081 is '+(corrR>0?'inflated because it partly captures':'deflated because it partly offsets')+' the effect of x\u2082. Multiple regression separates the two effects.';
    else msg='With high correlation (r = '+R(corrR,2)+'), simple regression '+(corrR>0?'substantially overestimates':'substantially underestimates')+' the partial effect of x\u2081 because it absorbs much of x\u2082\'s influence. This is omitted variable bias. Multiple regression recovers coefficients closer to truth, but with higher variance.';
    ce.innerHTML='<div class="i-card i-blue">'+msg+'</div>';
  }
}

/* ===== INIT ===== */
initTabs();
</script>
</body>
</html>
