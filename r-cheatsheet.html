<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R Cheatsheet — Krzysztof Zaremba</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
/* ── CSS Custom Properties ──────────────────────────────── */
:root {
  --bg: #f5f5f7;
  --bg-card: #ffffff;
  --bg-code: #1d1d1f;
  --text: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-muted: #aeaeb2;
  --border: #d2d2d7;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
  --color-data: #007aff;
  --color-data-bg: linear-gradient(135deg, #e8f4fd, #d0e8ff);
  --color-desc: #ff9500;
  --color-desc-bg: linear-gradient(135deg, #fff4e0, #ffe8c2);
  --color-freq: #ff2d55;
  --color-freq-bg: linear-gradient(135deg, #ffe5eb, #ffc8d4);
  --color-covcor: #30d158;
  --color-covcor-bg: linear-gradient(135deg, #e0fce8, #c0f5d0);
  --color-dist: #af52de;
  --color-dist-bg: linear-gradient(135deg, #f3e5fa, #e4c8f5);
  --color-reg: #ff3b30;
  --color-reg-bg: linear-gradient(135deg, #ffe5e3, #ffc8c5);
  --color-plot: #00c7be;
  --color-plot-bg: linear-gradient(135deg, #e0faf9, #c0f2f0);
  --color-math: #8e8e93;
  --color-math-bg: linear-gradient(135deg, #ececf0, #dddde3);
  --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

[data-theme="dark"] {
  --bg: #000000;
  --bg-card: #1c1c1e;
  --bg-code: #0a0a0a;
  --text: #f5f5f7;
  --text-secondary: #a1a1a6;
  --text-muted: #636366;
  --border: #38383a;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
  --color-data-bg: linear-gradient(135deg, #0a1e33, #0d2844);
  --color-desc-bg: linear-gradient(135deg, #2a1d00, #3a2800);
  --color-freq-bg: linear-gradient(135deg, #2a0a14, #3a1020);
  --color-covcor-bg: linear-gradient(135deg, #0a2a12, #103a18);
  --color-dist-bg: linear-gradient(135deg, #1a0a2a, #24103a);
  --color-reg-bg: linear-gradient(135deg, #2a0a08, #3a100c);
  --color-plot-bg: linear-gradient(135deg, #002a28, #003a36);
  --color-math-bg: linear-gradient(135deg, #1c1c1e, #2c2c2e);
}

/* ── Reset & Base ─────────────────────────────────────── */
.rc *, .rc *::before, .rc *::after { box-sizing: border-box; margin: 0; padding: 0; }
.rc {
  max-width: 1100px;
  margin: 0 auto;
  font-family: var(--sans);
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  padding: 0 20px 80px;
  -webkit-font-smoothing: antialiased;
}

/* ── Utility ────────────────────────────────────────── */
.rc-hidden { display: none !important; }

/* ── Header ─────────────────────────────────────────── */
.rc-hero {
  text-align: center;
  padding: 60px 20px 40px;
  position: relative;
}
.rc-hero h1 {
  font-size: 2.8rem;
  font-weight: 800;
  letter-spacing: -1.5px;
  background: linear-gradient(135deg, #007aff, #af52de, #ff3b30);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.rc-hero p {
  font-size: 1.15rem;
  color: var(--text-secondary);
  font-weight: 400;
  max-width: 500px;
  margin: 0 auto;
  line-height: 1.5;
}

/* ── Top Bar ──────────────────────────────────────────── */
.rc-topbar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.rc-search {
  width: 100%;
  max-width: 480px;
  padding: 12px 20px 12px 44px;
  font-size: 1rem;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: var(--bg-card);
  color: var(--text);
  outline: none;
  font-family: var(--sans);
  transition: border-color var(--transition), box-shadow var(--transition);
}
.rc-search:focus {
  border-color: #007aff;
  box-shadow: 0 0 0 4px rgba(0,122,255,0.12);
}
.rc-search-wrap {
  position: relative;
  width: 100%;
  max-width: 480px;
}
.rc-search-wrap::before {
  content: "\1F50D";
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.1rem;
  pointer-events: none;
  opacity: 0.5;
}
.rc-theme-btn {
  width: 44px; height: 44px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}
.rc-theme-btn:hover { border-color: #007aff; transform: scale(1.05); }

/* ── Topic Grid ───────────────────────────────────────── */
.rc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}
.rc-tile {
  background: var(--color-data-bg);
  border-radius: var(--radius);
  padding: 28px 24px;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition);
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.04);
}
[data-theme="dark"] .rc-tile { border-color: rgba(255,255,255,0.06); }
.rc-tile:hover { transform: translateY(-4px) scale(1.01); box-shadow: var(--shadow-lg); }
.rc-tile:active { transform: scale(0.98); }
.rc-tile-icon {
  font-size: 2.2rem;
  margin-bottom: 12px;
  display: block;
}
.rc-tile-name {
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--text);
}
.rc-tile-count {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.rc-tile-desc {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.4;
}
.rc-tile[data-topic="data"] { background: var(--color-data-bg); }
.rc-tile[data-topic="desc"] { background: var(--color-desc-bg); }
.rc-tile[data-topic="freq"] { background: var(--color-freq-bg); }
.rc-tile[data-topic="covcor"] { background: var(--color-covcor-bg); }
.rc-tile[data-topic="dist"] { background: var(--color-dist-bg); }
.rc-tile[data-topic="reg"] { background: var(--color-reg-bg); }
.rc-tile[data-topic="plot"] { background: var(--color-plot-bg); }
.rc-tile[data-topic="math"] { background: var(--color-math-bg); }

/* ── Topic Detail View ────────────────────────────────── */
.rc-topic-view {
  animation: rcFadeIn 0.35s ease;
}
@keyframes rcFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.rc-back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  color: #007aff;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px 0;
  margin-bottom: 20px;
  font-family: var(--sans);
  transition: opacity var(--transition);
}
.rc-back-btn:hover { opacity: 0.7; }
.rc-back-btn::before { content: "\2190"; font-size: 1.2rem; }
.rc-topic-header {
  margin-bottom: 32px;
}
.rc-topic-header h2 {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.rc-topic-header p {
  font-size: 1.05rem;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ── Flow Container ───────────────────────────────────── */
.rc-flow {
  position: relative;
  padding-left: 2px;
}

/* Flow section label */
.rc-flow-label {
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  margin: 32px 0 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.rc-flow-label:first-child { margin-top: 0; }
.rc-flow-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Flow connector line */
.rc-flow-line {
  display: flex;
  align-items: stretch;
  margin-bottom: 4px;
}
.rc-flow-connector {
  width: 32px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.rc-flow-connector .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  margin-top: 20px;
  transition: background var(--transition);
}
.rc-flow-connector .line {
  width: 2px;
  flex: 1;
  background: var(--border);
}
.rc-flow-line:last-child .rc-flow-connector .line { background: transparent; }

/* Flow node (function card) */
.rc-node {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  overflow: hidden;
  transition: box-shadow var(--transition), border-color var(--transition);
}
.rc-node:hover { box-shadow: var(--shadow-md); }
.rc-node.open { border-color: var(--node-accent, var(--border)); }
.rc-node-head {
  padding: 14px 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  user-select: none;
}
.rc-node-func {
  font-family: var(--mono);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  padding: 3px 10px;
  background: var(--bg);
  border-radius: 6px;
  border: 1px solid var(--border);
}
.rc-node-brief {
  flex: 1;
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.3;
}
.rc-node-arrow {
  font-size: 0.65rem;
  color: var(--text-muted);
  transition: transform var(--transition);
  flex-shrink: 0;
}
.rc-node.open .rc-node-arrow { transform: rotate(90deg); }
.rc-node-formula {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Node body (expanded detail) */
.rc-node-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.rc-node.open .rc-node-body { max-height: 1500px; }
.rc-node-inner {
  padding: 0 18px 18px;
  border-top: 1px solid var(--border);
}

/* ── Annotated Code ──────────────────────────────────── */
.rc-annotated {
  background: var(--bg-code);
  border-radius: var(--radius-sm);
  padding: 20px;
  margin: 14px 0;
  position: relative;
  overflow-x: auto;
}
.rc-annotated-line {
  font-family: var(--mono);
  font-size: 0.92rem;
  color: #e5e5ea;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
}
.rc-annotated .arg-hl {
  color: #64d2ff;
  cursor: pointer;
  border-bottom: 1px dashed rgba(100,210,255,0.4);
  transition: color var(--transition), border-color var(--transition);
  position: relative;
}
.rc-annotated .arg-hl:hover, .rc-annotated .arg-hl.active {
  color: #fff;
  border-bottom-color: #fff;
}
.rc-annotated .func-name { color: #ff6482; font-weight: 600; }
.rc-annotated .str-lit { color: #32d74b; }
.rc-annotated .num-lit { color: #ffd60a; }
.rc-annotated .kw-lit { color: #64d2ff; }
.rc-annotated .cmt { color: #636366; }

/* Argument annotations below the code */
.rc-arg-annotations {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.rc-arg-note {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 8px;
  border-left: 3px solid var(--node-accent, #007aff);
  cursor: pointer;
  transition: background var(--transition), opacity var(--transition);
  opacity: 0.75;
}
.rc-arg-note:hover, .rc-arg-note.active {
  opacity: 1;
  background: var(--bg-card);
}
.rc-arg-note-name {
  font-family: var(--mono);
  font-size: 0.82rem;
  font-weight: 700;
  color: #64d2ff;
  white-space: nowrap;
  min-width: 80px;
}
[data-theme="dark"] .rc-arg-note-name { color: #64d2ff; }
:root .rc-arg-note-name { color: #0066cc; }
.rc-arg-note-desc {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.5;
}
.rc-arg-note-default {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ── Formula Box ──────────────────────────────────────── */
.rc-formula {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  margin: 14px 0;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.rc-formula-icon {
  font-size: 1.2rem;
  flex-shrink: 0;
  margin-top: 2px;
  opacity: 0.6;
}
.rc-formula-math {
  font-family: var(--mono);
  font-size: 0.9rem;
  color: var(--text);
  line-height: 1.7;
}
.rc-formula-math .note {
  color: var(--text-muted);
  font-size: 0.82rem;
}

/* ── Example Block ────────────────────────────────────── */
.rc-example {
  position: relative;
  background: var(--bg-code);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  margin: 14px 0;
  overflow-x: auto;
}
.rc-example pre {
  font-family: var(--mono);
  font-size: 0.85rem;
  color: #e5e5ea;
  line-height: 1.7;
  margin: 0;
  white-space: pre-wrap;
}
.rc-example .cm { color: #636366; }
.rc-example .fn { color: #ff6482; }
.rc-example .st { color: #32d74b; }
.rc-example .nu { color: #ffd60a; }
.rc-example .kw { color: #64d2ff; }
.rc-copy {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: #a1a1a6;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 0.72rem;
  cursor: pointer;
  font-family: var(--sans);
  transition: all var(--transition);
}
.rc-copy:hover { background: rgba(255,255,255,0.16); color: #e5e5ea; }

/* ── Returns Box ──────────────────────────────────────── */
.rc-returns {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 16px;
  border-radius: 8px;
  margin: 14px 0;
  font-size: 0.88rem;
  line-height: 1.5;
}
.rc-returns-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.rc-returns--success { background: #ecfdf5; color: #065f46; }
.rc-returns--success .rc-returns-icon { color: #10b981; }
[data-theme="dark"] .rc-returns--success { background: rgba(16,185,129,0.08); color: #6ee7b7; }

/* ── Section mini-title ───────────────────────────────── */
.rc-label {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin: 18px 0 6px;
}

/* ── Visual Data Diagram ──────────────────────────────── */
.rc-diagram {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 20px;
  margin: 16px 0;
  overflow-x: auto;
}
.rc-diagram table {
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 0.85rem;
  width: auto;
}
.rc-diagram th {
  padding: 6px 16px;
  font-weight: 700;
  color: var(--text-muted);
  text-align: center;
  font-size: 0.78rem;
  border-bottom: 2px solid var(--border);
}
.rc-diagram td {
  padding: 8px 16px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.rc-diagram .row-label {
  color: var(--text-muted);
  font-weight: 600;
  text-align: left;
  padding-right: 20px;
}
.rc-diagram-caption {
  margin-top: 14px;
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.6;
}
.rc-diagram-caption code {
  font-family: var(--mono);
  font-size: 0.82rem;
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
}

/* ── Concept Cards (side by side) ─────────────────────── */
.rc-concepts {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin: 16px 0;
}
.rc-concept {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  text-align: center;
}
.rc-concept-label {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.rc-concept-items {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}

/* ── Distribution split ───────────────────────────────── */
.rc-dist-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 16px 0;
}
.rc-dist-col {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 20px;
}
.rc-dist-col h4 {
  font-size: 0.88rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.rc-dist-col .subtitle {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 14px;
  font-family: var(--mono);
}

/* ── No results ───────────────────────────────────────── */
.rc-no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 1.1rem;
  display: none;
}

/* ── Search Results ───────────────────────────────────── */
.rc-search-results {
  animation: rcFadeIn 0.25s ease;
}
.rc-search-results .rc-node {
  margin-bottom: 8px;
}
.rc-search-result-topic {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 2px 8px;
  border-radius: 4px;
  margin-left: auto;
  flex-shrink: 0;
}

/* ── Responsive ───────────────────────────────────────── */
@media (max-width: 700px) {
  .rc-hero h1 { font-size: 2rem; }
  .rc-hero { padding: 40px 10px 24px; }
  .rc-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .rc-tile { padding: 20px 16px; }
  .rc-tile-icon { font-size: 1.8rem; }
  .rc-tile-name { font-size: 1.05rem; }
  .rc-dist-split { grid-template-columns: 1fr; }
  .rc-node-head { flex-wrap: wrap; gap: 8px; padding: 12px 14px; }
  .rc-node-func { font-size: 0.85rem; }
  .rc-node-formula { display: none; }
  .rc-flow-connector { width: 24px; }
  .rc-concepts { grid-template-columns: 1fr; }
  .rc-annotated { padding: 14px; }
  .rc-arg-note { flex-direction: column; gap: 4px; }
  .rc-arg-note-name { min-width: unset; }
}
@media (max-width: 400px) {
  .rc-grid { grid-template-columns: 1fr; }
}
</style>

<div class="rc" id="rcApp">

<!-- Hero -->
<div class="rc-hero">
  <h1>R Cheatsheet</h1>
  <p>Your friendly guide to R functions. Click a topic to start exploring.</p>
</div>

<!-- Top bar -->
<div class="rc-topbar">
  <div class="rc-search-wrap">
    <input class="rc-search" type="text" id="rcSearch" placeholder="Search any function, topic, or keyword..." autocomplete="off">
  </div>
  <button class="rc-theme-btn" id="rcThemeBtn" title="Toggle dark mode" aria-label="Toggle dark mode">
    <span id="rcThemeIcon">&#9790;</span>
  </button>
</div>

<!-- Main content area -->
<div id="rcMainArea"></div>
<div class="rc-no-results" id="rcNoResults">No matching functions found.</div>

</div>

<script>
(function(){
"use strict";

/* ═══════════════════════════════════════════════════════════
   FUNCTION DATA

    +'correlation = covariance / (sd of x times sd of y)<br>'
    +'<span class="note">Correlation is just covariance divided by both standard deviations. This removes the units and forces the result to be between -1 and +1. So if you know cov, sd(x), and sd(y), you can compute cor by hand.</span>'
    +'</div></div>',

  dist: '<div class="rc-dist-split">'
    +'<div class="rc-dist-col"><h4>I have a VALUE \u2192 What is the PROBABILITY?</h4><div class="subtitle">These are the p functions (p for probability)</div>'
    +'<div style="font-size:0.88rem;color:var(--text-secondary);line-height:1.8">'
    +'Example: "A student got a t-statistic of 2.1. What is the probability of getting something this extreme or less?" \u2192 Use <strong>pt(2.1, df=498)</strong><br><br>'
    +'You give it a number on the x-axis \u2192 it tells you the area to the left.<br><br>'
    +'<strong>pnorm()</strong> \u2014 Normal (bell curve)<br>'
    +'<strong>pt()</strong> \u2014 t (like Normal, fatter tails)<br>'
    +'<strong>pchisq()</strong> \u2014 Chi-squared<br>'
    +'<strong>pf()</strong> \u2014 F-distribution</div></div>'
    +'<div class="rc-dist-col"><h4>I have a PROBABILITY \u2192 What is the VALUE?</h4><div class="subtitle">These are the q functions (q for quantile)</div>'
    +'<div style="font-size:0.88rem;color:var(--text-secondary);line-height:1.8">'
    +'Example: "I want the cutoff where 97.5% of the distribution falls below." \u2192 Use <strong>qt(0.975, df=498)</strong><br><br>'
    +'You give it an area \u2192 it tells you the number on the x-axis.<br><br>'
    +'<strong>qnorm()</strong> \u2014 z critical values<br>'
    +'<strong>qt()</strong> \u2014 t critical values for CIs<br>'
    +'<strong>qchisq()</strong> \u2014 JB test critical value<br>'
    +'<strong>qf()</strong> \u2014 F-test critical value</div></div></div>'
    +'<div class="rc-formula" style="margin:16px 0">'
    +'<span class="rc-formula-icon">\uD83D\uDCA1</span>'
    +'<div class="rc-formula-math">'
    +'<strong>Key insight:</strong> p and q are INVERSES of each other. If pnorm(1.96) = 0.975, then qnorm(0.975) = 1.96. You use p-functions to find p-values, and q-functions to find critical values for confidence intervals.'
    +'</div></div>',

  reg: '<div class="rc-formula" style="margin:16px 0">'
    +'<span class="rc-formula-icon">\uD83D\uDCC8</span>'
    +'<div class="rc-formula-math">'
    +'<strong>The workflow:</strong> lm() \u2192 summary() \u2192 predict() / confint()<br><br>'
    +'predicted y = intercept + slope times x + error<br>'
    +'<span class="note">intercept = predicted y when x=0, slope = change in y per unit x, error = what the line misses</span><br><br>'
    +'R-squared = SSR/SST = 1 - SSE/SST<br>'
    +'<span class="note">Fraction of variance in y explained by x. Closer to 1 = better fit.</span>'
    +'</div></div>',

  plot: '<div class="rc-concepts">'
    +'<div class="rc-concept"><div class="rc-concept-label">Two numeric vars?</div><div style="font-family:var(--mono);font-size:0.85rem;color:var(--text)">plot(x, y)</div></div>'
    +'<div class="rc-concept"><div class="rc-concept-label">Distribution of one var?</div><div style="font-family:var(--mono);font-size:0.85rem;color:var(--text)">hist(x)</div></div>'
    +'<div class="rc-concept"><div class="rc-concept-label">Compare categories?</div><div style="font-family:var(--mono);font-size:0.85rem;color:var(--text)">barplot(table(x))</div></div>'
    +'<div class="rc-concept"><div class="rc-concept-label">Compare groups?</div><div style="font-family:var(--mono);font-size:0.85rem;color:var(--text)">boxplot(y ~ group)</div></div>'
    +'</div>'
};

/* ═══════════════════════════════════════════════════════════
   DOM
   ═══════════════════════════════════════════════════════════ */
var mainArea = document.getElementById('rcMainArea');
var searchEl = document.getElementById('rcSearch');
var noResults = document.getElementById('rcNoResults');
var currentView = 'grid'; // 'grid', 'topic', 'search'

/* ═══════════════════════════════════════════════════════════
   HELPER: Build function node HTML
   ═══════════════════════════════════════════════════════════ */
function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function buildNode(f, topicId, showTopicBadge) {
  var topic = null;
  for(var i=0;i<TOPICS.length;i++) if(TOPICS[i].id===topicId) topic=TOPICS[i];
  var accentStyle = topic ? 'style="--node-accent:'+topic.color+'"' : '';
  var badge = '';
  if(showTopicBadge && topic) {
    badge = '<span class="rc-search-result-topic" style="background:'+topic.color+'1a;color:'+topic.color+'">'+esc(topic.name)+'</span>';
  }

  var formulaHtml = '';
  if(f.formula) {
    formulaHtml = '<div class="rc-formula"><span class="rc-formula-icon">\u2211</span><div class="rc-formula-math">'
      + esc(f.formula.text) + '<br><span class="note">' + esc(f.formula.note) + '</span></div></div>';
  }

  var formulaPreview = f.formula ? '<span class="rc-node-formula">' + esc(f.formula.text) + '</span>' : '';

  // Annotated code
  var annoHtml = '';
  if(f.annotated) {
    var a = f.annotated;
    annoHtml = '<div class="rc-label">Syntax</div><div class="rc-annotated"><div class="rc-annotated-line">' + a.line + '</div></div>';
    annoHtml += '<div class="rc-arg-annotations">';
    for(var j=0;j<a.args.length;j++){
      var arg = a.args[j];
      var defHtml = arg.default ? '<div class="rc-arg-note-default">Default: ' + esc(arg.default) + '</div>' : '';
      annoHtml += '<div class="rc-arg-note" ' + accentStyle + '>'
        + '<div class="rc-arg-note-name">' + esc(arg.name) + '</div>'
        + '<div><div class="rc-arg-note-desc">' + esc(arg.desc) + '</div>' + defHtml + '</div></div>';
    }
    annoHtml += '</div>';
  }

  // When to use (for plots)
  var whenHtml = f.when ? '<div class="rc-label">When to use</div><p style="font-size:0.88rem;color:var(--text-secondary);margin:4px 0 8px;line-height:1.5">' + esc(f.when) + '</p>' : '';

  // Example
  var exHtml = '<div class="rc-label">Example</div><div class="rc-example"><pre>' + f.example + '</pre>'
    + '<button class="rc-copy" title="Copy code">\u{1F4CB} Copy</button></div>';

  // Returns
  var retHtml = '<div class="rc-label">Returns</div><div class="rc-returns rc-returns--success"><span class="rc-returns-icon">\u2192</span><span>' + esc(f.returns) + '</span></div>';

  return '<div class="rc-node" ' + accentStyle + ' data-id="'+f.id+'">'
    + '<div class="rc-node-head">'
    + '<span class="rc-node-func">' + esc(f.code) + '</span>'
    + '<span class="rc-node-brief">' + esc(f.brief) + '</span>'
    + formulaPreview
    + badge
    + '<span class="rc-node-arrow">\u25B6</span>'
    + '</div>'
    + '<div class="rc-node-body"><div class="rc-node-inner">'
    + formulaHtml
    + whenHtml
    + annoHtml
    + exHtml
    + retHtml
    + '</div></div></div>';
}

/* ═══════════════════════════════════════════════════════════
   RENDER: Topic Grid (main page)
   ═══════════════════════════════════════════════════════════ */
function renderGrid() {
  currentView = 'grid';
  noResults.style.display = 'none';
  var h = '<div class="rc-grid">';
  for(var i=0;i<TOPICS.length;i++){
    var t = TOPICS[i];
    var count = FUNCS[t.id] ? FUNCS[t.id].length : 0;
    h += '<div class="rc-tile" data-topic="'+t.id+'">'
      + '<span class="rc-tile-icon">' + t.icon + '</span>'
      + '<div class="rc-tile-name">' + esc(t.name) + '</div>'
      + '<div class="rc-tile-count">' + count + ' function' + (count!==1?'s':'') + '</div>'
      + '<div class="rc-tile-desc">' + esc(t.desc) + '</div></div>';
  }
  h += '</div>';
  mainArea.innerHTML = h;

  // Tile click handlers
  var tiles = mainArea.querySelectorAll('.rc-tile');
  for(var j=0;j<tiles.length;j++){
    tiles[j].addEventListener('click', function(){
      renderTopic(this.getAttribute('data-topic'));
    });
  }
}

/* ═══════════════════════════════════════════════════════════
   RENDER: Topic Detail View
   ═══════════════════════════════════════════════════════════ */
function renderTopic(topicId) {
  currentView = 'topic';
  noResults.style.display = 'none';
  var topic = null;
  for(var i=0;i<TOPICS.length;i++) if(TOPICS[i].id===topicId) topic=TOPICS[i];
  if(!topic) return renderGrid();

  var flows = FLOWS[topicId] || [];
  var funcs = FUNCS[topicId] || [];

  var h = '<div class="rc-topic-view">';
  h += '<button class="rc-back-btn" id="rcBack">Back to all topics</button>';
  h += '<div class="rc-topic-header"><h2>' + topic.icon + ' ' + esc(topic.name) + '</h2>';
  h += '<p>' + esc(topic.intro) + '</p></div>';

  // Special visual content
  if(SPECIAL[topicId]) h += SPECIAL[topicId];

  // Flow sections
  for(var s=0;s<flows.length;s++){
    var section = flows[s];
    h += '<div class="rc-flow">';
    h += '<div class="rc-flow-label">' + esc(section.label) + '</div>';

    for(var fi=0;fi<section.funcs.length;fi++){
      var funcId = section.funcs[fi];
      var func = null;
      for(var k=0;k<funcs.length;k++) if(funcs[k].id===funcId) func=funcs[k];
      if(!func) continue;

      h += '<div class="rc-flow-line">';
      h += '<div class="rc-flow-connector"><div class="dot" style="background:'+topic.color+'"></div><div class="line"></div></div>';
      h += buildNode(func, topicId, false);
      h += '</div>';
    }
    h += '</div>';
  }

  h += '</div>';
  mainArea.innerHTML = h;

  // Scroll to top
  window.scrollTo({top:0, behavior:'smooth'});

  // Back button
  document.getElementById('rcBack').addEventListener('click', function(){
    searchEl.value = '';
    renderGrid();
  });

  attachNodeEvents();
}

/* ═══════════════════════════════════════════════════════════
   RENDER: Search Results
   ═══════════════════════════════════════════════════════════ */
function renderSearch(query) {
  currentView = 'search';
  var q = query.toLowerCase().trim();
  if(!q) { renderGrid(); return; }

  var results = [];
  var topicIds = Object.keys(FUNCS);
  for(var i=0;i<topicIds.length;i++){
    var tid = topicIds[i];
    var arr = FUNCS[tid];
    for(var j=0;j<arr.length;j++){
      var f = arr[j];
      var text = (f.code + ' ' + f.brief + ' ' + (f.formula ? f.formula.text + ' ' + f.formula.note : '') + ' ' + (f.when || '')).toLowerCase();
      // Also search topic name
      for(var t=0;t<TOPICS.length;t++){
        if(TOPICS[t].id===tid) text += ' ' + TOPICS[t].name.toLowerCase();
      }
      if(text.indexOf(q) !== -1) results.push({func:f, topic:tid});
    }
  }

  if(results.length === 0){
    mainArea.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }

  noResults.style.display = 'none';
  var h = '<div class="rc-search-results">';
  h += '<button class="rc-back-btn" id="rcBack">Back to all topics</button>';
  h += '<p style="color:var(--text-secondary);margin-bottom:20px;font-size:0.95rem">' + results.length + ' result' + (results.length!==1?'s':'') + ' for "' + esc(query) + '"</p>';

  for(var r=0;r<results.length;r++){
    h += buildNode(results[r].func, results[r].topic, true);
  }
  h += '</div>';
  mainArea.innerHTML = h;

  document.getElementById('rcBack').addEventListener('click', function(){
    searchEl.value = '';
    renderGrid();
  });

  attachNodeEvents();
}

/* ═══════════════════════════════════════════════════════════
   ATTACH NODE EVENTS (toggle, copy, arg highlight)
   ═══════════════════════════════════════════════════════════ */
function attachNodeEvents() {
  // Toggle
  var heads = mainArea.querySelectorAll('.rc-node-head');
  for(var i=0;i<heads.length;i++){
    heads[i].addEventListener('click', function(){
      this.parentElement.classList.toggle('open');
    });
  }

  // Copy
  var copyBtns = mainArea.querySelectorAll('.rc-copy');
  for(var j=0;j<copyBtns.length;j++){
    copyBtns[j].addEventListener('click', function(ev){
      ev.stopPropagation();
      var pre = this.previousElementSibling;
      var text = pre.textContent || pre.innerText;
      var btn = this;
      if(navigator.clipboard){
        navigator.clipboard.writeText(text).then(function(){
          btn.textContent = '\u2713 Copied!';
          setTimeout(function(){ btn.innerHTML = '\uD83D\uDCCB Copy'; }, 1500);
        });
      } else {
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = '\u2713 Copied!';
        setTimeout(function(){ btn.innerHTML = '\uD83D\uDCCB Copy'; }, 1500);
      }
    });
  }

  // Arg note hover highlight
  var notes = mainArea.querySelectorAll('.rc-arg-note');
  for(var k=0;k<notes.length;k++){
    notes[k].addEventListener('mouseenter', function(){ this.classList.add('active'); });
    notes[k].addEventListener('mouseleave', function(){ this.classList.remove('active'); });
  }
}

/* ═══════════════════════════════════════════════════════════
   SEARCH
   ═══════════════════════════════════════════════════════════ */
var searchTimer = null;
searchEl.addEventListener('input', function(){
  clearTimeout(searchTimer);
  var v = searchEl.value;
  searchTimer = setTimeout(function(){
    if(v.trim()) renderSearch(v);
    else renderGrid();
  }, 150);
});

/* Keyboard shortcuts */
document.addEventListener('keydown', function(ev){
  if(ev.key === '/' && document.activeElement !== searchEl){
    ev.preventDefault();
    searchEl.focus();
  }
  if(ev.key === 'Escape'){
    if(searchEl.value) {
      searchEl.value = '';
      renderGrid();
    }
    searchEl.blur();
  }
});

/* ═══════════════════════════════════════════════════════════
   DARK MODE
   ═══════════════════════════════════════════════════════════ */
var themeBtn = document.getElementById('rcThemeBtn');
var themeIcon = document.getElementById('rcThemeIcon');
var root = document.documentElement;

function setTheme(dark){
  if(dark){
    root.setAttribute('data-theme','dark');
    themeIcon.innerHTML = '&#9788;';
  } else {
    root.removeAttribute('data-theme');
    themeIcon.innerHTML = '&#9790;';
  }
  try { localStorage.setItem('rc-theme', dark?'dark':'light'); } catch(e){}
}

var saved = null;
try { saved = localStorage.getItem('rc-theme'); } catch(e){}
if(saved === 'dark') setTheme(true);

themeBtn.addEventListener('click', function(){
  setTheme(root.getAttribute('data-theme') !== 'dark');
});

/* ═══════════════════════════════════════════════════════════
   INITIAL RENDER
   ═══════════════════════════════════════════════════════════ */
renderGrid();

})();
</script>
</body>
</html>
